const CAT_ORDER=["Crypto","Metals","Energy","US Sectors","Global Equities","Rates","Curves","Currencies","Credit"];
const ib=r=>r==="bull"||r==="falling"||r==="steepening";
const ie=r=>r==="bear"||r==="rising"||r==="flattening";
const rc=r=>ib(r)?"bu":ie(r)?"be":"si";
const rl=r=>({bull:"BULL",bear:"BEAR",sideways:"SIDE",rising:"RISING",falling:"FALLING",stable:"STABLE",steepening:"STEEP",flattening:"FLAT"}[r]||r||"—");
const tc=r=>ib(r)?"var(--g)":ie(r)?"var(--r)":"var(--x)";
const fP=(p,n)=>{if(p==null)return"—";if(["ETH_BTC","JPYUSD","CreditSpread","CNYUSD","KRWUSD"].includes(n))return p.toFixed(4);if(p>10000)return p.toLocaleString("en",{maximumFractionDigits:0});if(p>100)return p.toLocaleString("en",{maximumFractionDigits:1});return p<1?p.toFixed(4):p.toFixed(2)};
const zP=z=>((Math.max(-3,Math.min(3,z||0))+3)/6)*100;
function catScore(a){const v=Object.values(a),s=v.map(x=>ib(x.regime)?1:ie(x.regime)?-1:0);return s.reduce((a,b)=>a+b,0)/s.length}
let S={view:"overview",exp:null,sort:"default"};
function render(){
const{view,exp,sort}=S;const app=document.getElementById("app");
let h=`<header><h1>Regime Monitor</h1><div class="m">${D.s.total_assets} assets · wk ${D.s.date}</div></header>`;
h+=`<div class="tabs">${["overview","heatmap","extremes","method"].map(v=>`<button class="${view===v?"on":""}" onclick="U('view','${v}')">${v}</button>`).join("")}</div>`;
h+=`<div class="strip">`;
CAT_ORDER.forEach(k=>{const a=D.s.categories[k];if(!a)return;const sc=catScore(a),c=sc>0.3?"bu":sc<-0.3?"be":"si";
const bg=c==="bu"?"var(--gb)":c==="be"?"var(--rb)":"var(--xb)";const bd=c==="bu"?"var(--gd)":c==="be"?"var(--rd)":"var(--b)";const tc2=c==="bu"?"var(--g)":c==="be"?"var(--r)":"var(--x)";
h+=`<div class="chip" style="background:${bg};border-color:${bd}" onclick="U('exp','${k}');U('view','overview')"><span>${k}</span><span class="sc" style="color:${tc2}">${sc>0?"+":""}${sc.toFixed(2)}</span></div>`;});
h+=`</div>`;
if(view==="overview")h+=rOv();else if(view==="heatmap")h+=rHm();else if(view==="extremes")h+=rEx();else h+=rMe();
h+=`<footer>4-week return / 26-week rolling vol · z>0.8 = directional regime · weekly data, 3Y</footer>`;
app.innerHTML=h}

function sortAssets(entries,sort){
if(sort==="z-asc")return[...entries].sort((a,b)=>(a[1].zscore||0)-(b[1].zscore||0));
if(sort==="z-desc")return[...entries].sort((a,b)=>(b[1].zscore||0)-(a[1].zscore||0));
if(sort==="alpha")return[...entries].sort((a,b)=>a[0].localeCompare(b[0]));
if(sort==="regime"){const ro=r=>ib(r)?0:ie(r)?2:1;return[...entries].sort((a,b)=>ro(a[1].regime)-ro(b[1].regime));}
return entries}

function sortBar(){return`<div class="sort-ctrl">Sort: ${["default","z-desc","z-asc","alpha","regime"].map(s=>`<button class="${S.sort===s?"on":""}" onclick="U('sort','${s}')">${s==="z-desc"?"z↓":s==="z-asc"?"z↑":s}</button>`).join("")}</div>`}

function rOv(){let h=sortBar();
CAT_ORDER.forEach(k=>{const assets=D.s.categories[k];if(!assets)return;const isE=S.exp===k;
const entries=sortAssets(Object.entries(assets),S.sort);
const nb=entries.filter(([,a])=>ib(a.regime)).length,nr=entries.filter(([,a])=>ie(a.regime)).length,ns=entries.length-nb-nr;
h+=`<div class="cb"><div class="ch" onclick="U('exp','${isE?"_":k}')"><h2>${k}</h2><div class="st">`;
if(nb)h+=`<span><span class="d" style="background:var(--g)"></span>${nb}</span>`;
if(ns)h+=`<span><span class="d" style="background:var(--x)"></span>${ns}</span>`;
if(nr)h+=`<span><span class="d" style="background:var(--r)"></span>${nr}</span>`;
h+=`<span>${isE?"▾":"▸"}</span></div></div><div class="cg">`;
entries.forEach(([n,d])=>{const c=rc(d.regime),z=d.zscore,zc=tc(d.regime);
h+=`<div class="a ${c}"><div class="ai"><div style="display:flex;justify-content:space-between;align-items:center"><span class="an">${n}</span><span class="al ${c}">${rl(d.regime)}</span></div><div class="ar"><span class="ap">${fP(d.price,n)}</span><span class="az" style="color:${zc}">${z!=null?(z>0?"+":"")+z.toFixed(2):"—"}</span></div><div class="zb"><div class="md"></div><div class="dt" style="left:${zP(z)}%;background:${zc}"></div></div></div></div>`;});
h+=`</div>`;
if(isE){h+=`<div class="ce"><div style="font-family:var(--m);font-size:9px;color:var(--t3);margin-bottom:4px">12-WEEK TIMELINE</div>`;
entries.forEach(([n])=>{const tl=D.t[n],zd=D.z[n];
h+=`<div class="tr"><span class="lb">${n}</span>`;
if(zd){const mn=Math.min(...zd),mx=Math.max(...zd),rng=mx-mn||1;
let pts=zd.map((v,i)=>`${(i/(zd.length-1))*72},${18-((v-mn)/rng)*14-2}`).join(" ");
const lc=tc(D.s.categories[S.exp]?.[n]?.regime);
h+=`<svg width="72" height="18" style="flex-shrink:0"><line x1="0" y1="9" x2="72" y2="9" stroke="var(--b)" stroke-width="1" stroke-dasharray="2,2"/><polyline fill="none" stroke="${lc}" stroke-width="1.5" points="${pts}"/></svg>`}
if(tl){h+=`<div class="tb">`;tl.forEach((d,i)=>{const bc=ib(d.r)?"var(--g)":ie(d.r)?"var(--r)":"var(--b)";
h+=`<div style="background:${bc};opacity:${i===tl.length-1?1:.6}" title="${d.d}: ${d.r}"></div>`});h+=`</div>`}
h+=`</div>`});h+=`</div>`}
h+=`</div>`});return h}

function rHm(){
const all=[];Object.entries(D.s.categories).forEach(([cat,a])=>{Object.entries(a).forEach(([n,d])=>all.push({n,cat,...d}))});
let sorted;
if(S.sort==="alpha")sorted=all.sort((a,b)=>a.n.localeCompare(b.n));
else if(S.sort==="regime"){const ro=r=>ib(r)?0:ie(r)?2:1;sorted=all.sort((a,b)=>ro(a.regime)-ro(b.regime))}
else sorted=all.sort((a,b)=>(a.zscore||0)-(b.zscore||0));
let h=sortBar()+`<div style="font-size:10px;color:var(--t3);margin-bottom:8px">${all.length} assets</div>`;
sorted.forEach(a=>{const z=a.zscore||0,it=Math.min(1,Math.abs(z)/3),
bg=z>0?`rgba(22,163,106,${it*.12})`:z<0?`rgba(220,38,38,${it*.12})`:"transparent",zc=tc(a.regime);
h+=`<div class="hr" style="background:${bg}"><span class="nm">${a.n}</span><div class="bw"><div class="md" style="position:absolute;left:50%;top:0;width:1px;height:3px;background:var(--b)"></div><div class="dt" style="position:absolute;top:-2px;left:${zP(z)}%;width:7px;height:7px;border-radius:50%;background:${zc};transform:translateX(-3.5px)"></div></div><span class="hz" style="color:${zc}">${z>0?"+":""}${z.toFixed(2)}</span><span class="hl" style="color:${zc}">${rl(a.regime)}</span></div>`});
return h}

function rEx(){
const all=[];Object.entries(D.s.categories).forEach(([cat,a])=>{Object.entries(a).forEach(([n,d])=>all.push({n,cat,...d}))});
const ext=all.filter(a=>a.zscore!=null&&Math.abs(a.zscore)>1.5).sort((a,b)=>a.zscore-b.zscore);
let h=`<div style="font-size:10px;color:var(--t3);margin-bottom:10px">Assets with |z| > 1.5</div>`;
ext.forEach(a=>{const bear=a.zscore<0,c=bear?"be":"bu";
h+=`<div class="ec ${c}"><div class="ei">${bear?"▼":"▲"}</div><div class="ef"><div class="n">${a.n}</div><div class="s">${a.cat} · ${fP(a.price,a.n)}</div></div><div class="ez"><div class="v" style="color:${tc(a.regime)}">${a.zscore>0?"+":""}${a.zscore.toFixed(2)}</div><div class="l" style="color:${tc(a.regime)}">${rl(a.regime)}</div></div></div>`});
h+=`<div class="rb"><h3>Regime Reading</h3><p><strong>Bear (${ext.filter(a=>a.zscore<0).length}):</strong> ${ext.filter(a=>a.zscore<0).map(a=>a.n+"("+a.zscore.toFixed(2)+")").join(", ")}<br><strong>Bull (${ext.filter(a=>a.zscore>0).length}):</strong> ${ext.filter(a=>a.zscore>0).map(a=>a.n+"(+"+a.zscore.toFixed(2)+")").join(", ")}<br><br>Global equities, credit, and rates simultaneously in bear/rising regime. Only energy shows strong bull. Crypto in sideways — decoupling window.</p></div>`;
return h}

function rMe(){return`
<div class="meth"><h3>Methodology</h3><p>
<strong>Regime classification</strong> is based on vol-normalized z-scores:<br><br>
1. Compute <strong>4-week return</strong> for each asset<br>
2. Divide by <strong>26-week rolling volatility</strong> (that asset's "normal" range)<br>
3. <code>z = 4w return ÷ expected volatility</code><br><br>
<strong>Price-based assets</strong> (equities, crypto, commodities, FX, credit):<br>
&nbsp;&nbsp;z > +0.8 → <span style="color:var(--g);font-weight:700">BULL</span> &nbsp; z < -0.8 → <span style="color:var(--r);font-weight:700">BEAR</span> &nbsp; between → <span style="color:var(--x);font-weight:700">SIDEWAYS</span><br><br>
<strong>Rates</strong> (bond yields — level changes, not returns):<br>
&nbsp;&nbsp;z > +0.8 → <span style="color:var(--r);font-weight:700">RISING</span> (yields up = bonds down)<br>
&nbsp;&nbsp;z < -0.8 → <span style="color:var(--g);font-weight:700">FALLING</span> (yields down = bonds up)<br>
&nbsp;&nbsp;between → <span style="color:var(--x);font-weight:700">STABLE</span><br><br>
<strong>Curves</strong> (yield spreads — long minus short):<br>
&nbsp;&nbsp;z > +0.8 → <span style="color:var(--g);font-weight:700">STEEPENING</span> &nbsp; z < -0.8 → <span style="color:var(--r);font-weight:700">FLATTENING</span><br><br>
Vol-normalization means BTC (weekly vol ~8%) and Gold (~2%) use the <strong>same threshold</strong>. The question is always: "is this move abnormal <em>for this asset</em>?"<br><br>
Data: weekly close, 3-year history (158 weeks). Source: Yahoo Finance.
</p></div>`}

function U(k,v){if(k==="exp")S.exp=S.exp===v?null:v;else S[k]=v;render()}
render();
</script>
