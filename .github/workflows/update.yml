name: Update Regime Monitor

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install yfinance pandas numpy scikit-learn hmmlearn scipy
    
    - name: Generate dashboard
      run: python generate.py
    
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Regime Bot"
        git add index.html
        git diff --cached --quiet || git commit -m "update: $(date -u +%Y-%m-%d)"
        git push
