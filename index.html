const it=m==='threshold'?Math.min(1,Math.abs(z)/3):z;
const bg=ib(a.regime)?'rgba(22,163,106,'+it*.15+')':ie(a.regime)?'rgba(220,38,38,'+it*.15+')':'transparent';
h+='<div class="hr" style="background:'+bg+'"><span class="nm">'+a.n+'</span><div class="bw"><div style="position:absolute;left:50%;top:0;width:1px;height:3px;background:var(--b)"></div><div style="position:absolute;top:-2px;left:'+(m==='threshold'?zP(z):z*100)+'%;width:7px;height:7px;border-radius:50%;background:'+zc+';transform:translateX(-3.5px)"></div></div><span class="hz" style="color:'+zc+'">'+(m==='threshold'?(z>0?'+':'')+z.toFixed(2):(z*100).toFixed(0)+'%')+'</span><span class="hl" style="color:'+zc+'">'+rl(a.regime)+'</span></div>'});
return h}

function rEx(){
const m=S.method;const cats=D.methods[m]||{};
const all=[];Object.entries(cats).forEach(([cat,a])=>{Object.entries(a).forEach(([n,d])=>all.push({n,cat,...d}))});
let ext;
if(m==='threshold')ext=all.filter(a=>a.score!=null&&Math.abs(a.score)>1.5).sort((a,b)=>a.score-b.score);
else ext=all.filter(a=>a.score!=null&&a.score>0.7).sort((a,b)=>b.score-a.score);
let h='<div style="font-size:10px;color:var(--t3);margin-bottom:8px">'+(m==='threshold'?'|z| > 1.5':'Confidence > 70%')+' · '+ML[m]+'</div>';
ext.forEach(a=>{const bear=ie(a.regime),c=bear?'be':'bu';
h+='<div class="ec '+c+'"><div class="ei">'+(bear?'▼':'▲')+'</div><div class="ef"><div class="n">'+a.n+'</div><div class="s">'+a.cat+' · '+fP(a.price,a.n)+'</div></div><div class="ez"><div class="v" style="color:'+tc(a.regime)+'">'+(m==='threshold'?(a.score>0?'+':'')+a.score.toFixed(2):(a.score*100).toFixed(0)+'%')+'</div><div class="l" style="color:'+tc(a.regime)+'">'+rl(a.regime)+'</div></div></div>'});
return h}

function rCons(){
const cons=D.consensus;
const consColor={'strong_positive':'var(--g)','strong_negative':'var(--r)','lean_positive':'#86efac','lean_negative':'#fca5a5','mixed':'var(--x)'};
const consCls={'strong_positive':'sp','strong_negative':'sn','lean_positive':'lp','lean_negative':'ln','mixed':'mx'};
const consLabel={'strong_positive':'STRONG ▲','strong_negative':'STRONG ▼','lean_positive':'LEAN ▲','lean_negative':'LEAN ▼','mixed':'MIXED'};
const dotColor={'positive':'var(--g)','negative':'var(--r)','neutral':'var(--x)'};
const dotLetter={'positive':'B','negative':'R','neutral':'S'};
const methodShort={'threshold':'T','hmm':'H','jump':'J','gmm':'G'};

let h='<div style="font-size:11px;color:var(--t2);margin-bottom:10px">4-method consensus: <b>Strong</b> = 3-4 agree, <b>Lean</b> = 2 agree (no opposing), <b>Mixed</b> = disagreement</div>';
h+=sb();

CO.forEach(k=>{const catCons=cons[k];if(!catCons)return;
let entries=Object.entries(catCons);
if(S.sort==='alpha')entries.sort((a,b)=>a[0].localeCompare(b[0]));
else if(S.sort==='z-desc')entries.sort((a,b)=>b[1].agreement-a[1].agreement);
else if(S.sort==='z-asc')entries.sort((a,b)=>a[1].agreement-b[1].agreement);
else if(S.sort==='regime'){const ro=c=>c.startsWith('strong_p')?0:c.startsWith('lean_p')?1:c==='mixed'?2:c.startsWith('lean_n')?3:4;entries.sort((a,b)=>ro(a[1].consensus)-ro(b[1].consensus))}

const sp=entries.filter(([,c])=>c.consensus.includes('positive')).length;
const sn=entries.filter(([,c])=>c.consensus.includes('negative')).length;
const mx=entries.filter(([,c])=>c.consensus==='mixed').length;

h+='<div class="cb"><div class="ch"><h2>'+k+'</h2><div class="st">';
if(sp)h+='<span><span class="d" style="background:var(--g)"></span>'+sp+'</span>';
if(mx)h+='<span><span class="d" style="background:var(--x)"></span>'+mx+'</span>';
if(sn)h+='<span><span class="d" style="background:var(--r)"></span>'+sn+'</span>';
h+='</div></div><div style="padding:3px 8px 6px">';

entries.forEach(([name,c])=>{
const cls=consCls[c.consensus]||'mx';
const label=consLabel[c.consensus]||'—';
h+='<div class="cons-row '+cls+'"><span class="an" style="width:90px">'+name+'</span>';
h+='<span class="al '+(['sp','lp'].includes(cls)?'bu':['sn','ln'].includes(cls)?'be':'si')+'">'+label+'</span>';
h+='<div class="cons-dots" style="margin-left:8px">';
['threshold','hmm','jump','gmm'].forEach(m=>{
  const v=c.votes[m];
  if(v){
    const bg=dotColor[v]||'var(--x)';
    const lt=dotLetter[v]||'?';
    h+='<span style="background:'+bg+';color:#fff" title="'+m+': '+v+'">'+methodShort[m]+'</span>';
  }
});
h+='</div>';
h+='<span class="ap" style="margin-left:auto">'+fP(c.price,name)+'</span>';
h+='</div>'});
h+='</div></div>'});
return h}

function rMe(){return'<div class="meth"><h3>Methodology</h3><p>'+
'<b>1. Threshold (z-score)</b><br>4-week return ÷ 26-week rolling volatility. z > +0.8 = bull, z < -0.8 = bear. Simple, interpretable, no training required.<br><br>'+
'<b>2. Hidden Markov Model</b><br>3-state Gaussian HMM on [4w return, 4w volatility]. States mapped to bull/bear/sideways by mean return. Learns transition probabilities automatically. Score = posterior probability of current state.<br><br>'+
'<b>3. Statistical Jump Model</b><br>GMM emission model + Viterbi DP with jump penalty (λ=10). Penalizes frequent regime switches → more persistent states. Based on Nystrup et al. 2020.<br><br>'+
'<b>4. GMM Clustering</b><br>3-component Gaussian Mixture on [4w return, 4w volatility]. No temporal structure — purely cross-sectional clustering. Score = posterior probability.<br><br>'+
'<b>Consensus</b><br>Normalizes all regimes to positive/negative/neutral. Strong = 3+ methods agree. Lean = 2 agree, none opposing. Mixed = disagreement.<br><br>'+
'<b>Rate assets</b> use level changes (diff) instead of returns. Rising = yields up = bonds down.<br>'+
'<b>Curve assets</b> use spread changes. Steepening = long rates rising faster than short.'+
'</p></div>'}

function U(k,v){S[k]=v;render()}
render();
</script>
